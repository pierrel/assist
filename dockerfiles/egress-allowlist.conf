# Default egress allowlist for the assist sandbox.  Exact-match
# hostnames; the proxy refuses anything not on this list with HTTP 403.
#
# Override at runtime with ASSIST_SANDBOX_EGRESS_ALLOWLIST in
# .deploy.env (comma-separated).  The env var REPLACES this file when
# set — append your additions to the four entries below if you only
# mean to extend the defaults.
#
# Add a line, redeploy with `make deploy-sandbox-build`, and the
# proxy container is recreated on the next sandbox start.

# Python package distribution — required for `pip install --user` from
# inside the sandbox.  Covers the dev-agent eval and any user-written
# tests that pull dependencies.
pypi.org
files.pythonhosted.org
pip.pypa.io

# Local model endpoint.  ASSIST_MODEL_URL is rewritten to
# host.docker.internal by SandboxManager._rewrite_localhost; the proxy
# is dual-homed (egress-internal + bridge) so it can reach the host
# gateway on the agent's behalf.
host.docker.internal
