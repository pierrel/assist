# Egress allowlist for the assist sandbox.  Exact-match hostnames
# (case-insensitive per RFC 4343); the proxy refuses anything not on
# this list with HTTP 403.  Single source of truth — no env override.
#
# To add or remove a hostname: edit this file, then
# `make deploy-code && make restart`.  The proxy container is
# recreated on the next sandbox start when the allowlist hash changes.

# Python package distribution — required for `pip install --user` from
# inside the sandbox.  Covers the dev-agent eval and any user-written
# tests that pull dependencies.
pypi.org
files.pythonhosted.org
pip.pypa.io

# Local model endpoint.  ASSIST_MODEL_URL is rewritten to
# host.docker.internal by SandboxManager._rewrite_localhost; the proxy
# is dual-homed (egress-internal + bridge) so it can reach the host
# gateway on the agent's behalf.
host.docker.internal
